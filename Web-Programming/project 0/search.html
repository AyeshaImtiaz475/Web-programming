<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Search</title>
    <link rel="stylesheet" href="stylesearch.css">
</head>
<body>
    <div id="header">
        <p>Google</p>
        <img src="image1.png" />
        <img src="image2.png"/>
     </div>
    
     <h1><a href="index.html">Advanced search</a></h1>
     <hr>
     <form>
        <h2 id="caption">Find pages with...</h2><br/>
        all these words: <input type="text" /><br/>
        this exact word or phrase: <input type="text" /><br/>
        any of these words: <input type="text" /><br/>
        none of these words: <input type="text" /><br/>
        numbers randing from: <input type="text" /> to <input type="text" /><br/>
     </form>

     <br>
     <br>
     <hr>
     <form>
        <h2 id="caption">Then narrow your results by...</h2><br/>
        language: <select id="dropdown" name="options">
            <option value="option1">any lanuage</option>
            <option value="option2">Arabic</option>
            <option value="option3">chinese</option>
            <option value="option3">Korean</option>
            <option value="option3">Japenese</option>
            <option value="option3">Persian</option>
            <option value="option3">Armenian</option>
        </select><br/>
        region: <select id="dropdown" name="options">
            <option value="option1">any region</option>
            <option value="option2">Pakistan</option>
            <option value="option3">Iran</option>
            <option value="option3">Afghanistan</option>
            <option value="option3">China</option>
            <option value="option3">Turkey</option>
            <option value="option3">Egypt</option>
        </select><br/>
        last update: <select id="dropdown" name="options">
            <option value="option1">any time</option>
            <option value="option2">past 24 hours </option>
            <option value="option3">past week</option>
            <option value="option3">past month</option>
            <option value="option3">past year</option>
        </select><br/>
        terms appearing: <select id="dropdown" name="options">
            <option value="option1">any where in the page</option>
            <option value="option2">in the titel of the page </option>
            <option value="option3">in the text of the page</option>
            <option value="option3">in the URL of the page</option>
            <option value="option3">in the link of the page</option>
        </select><br/>
        file type: <select id="dropdown" name="options">
            <option value="option1">PDF (.pdf)</option>
            <option value="option2">Postscript(.ps)</option>
            <option value="option3">Autodesk (.dwf)</option>
            <option value="option3">Microsoft Excel(.xsls)</option>
            <option value="option3">Microsoft Powerpoint (.ppt)</option>
            <option value="option3">Microsoft word (.doc)</option>
        </select><br/>
        <button><a href="https://www.google.com/about/careers/applications/locations/mountain-view">Submit</a></button>
     </form>
</body>
</html>
