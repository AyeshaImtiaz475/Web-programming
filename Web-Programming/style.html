<!DOCTYPE html>
<html lang="en">
<head>
    <title>CSS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h2{
            color: brown;
            text-align: center;
        }
        #foo{
            color: blue;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        .bar{
            color: red;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
    </style>
</head>
<body >
    <h1 style="color: blue; text-align:center">Welcome to my Web Page!</h1>
    <h1 style="color: blue; text-align:center">This is the second heading</h1>
    <h2>Smallest</h2>
    <h2>Hellow world!</h2>
    <h1 id="foo">Heading 1</h1>
    <h1 class="bar">Heading 2</h1>
    <h1>Heading 3</h1>
    

    <!-- specificity: inline, id, class, type -->
</body>
</html>
